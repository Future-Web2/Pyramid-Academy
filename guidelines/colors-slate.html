<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Slate ramp" subtitle="Surfaces and text" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .sw { border-radius: var(--radius-sm); padding: 10px 8px; min-height: 100px; display: flex; flex-direction: column; justify-content: space-between; font-size: 10px; }
  .sw .name { font-weight: 600; }
  .sw .hex { font-family: var(--font-mono); opacity: 0.7; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#F8FAFC;color:#1E293B;border:1px solid #E2E8F0"><span class="name">50</span><span class="hex">F8FAFC</span></div>
    <div class="sw" style="background:#F1F5F9;color:#1E293B"><span class="name">100</span><span class="hex">F1F5F9</span></div>
    <div class="sw" style="background:#E2E8F0;color:#1E293B"><span class="name">300</span><span class="hex">E2E8F0</span></div>
    <div class="sw" style="background:#CBD5E1;color:#1E293B"><span class="name">400</span><span class="hex">CBD5E1</span></div>
    <div class="sw" style="background:#94A3B8;color:#fff"><span class="name">500</span><span class="hex">94A3B8</span></div>
    <div class="sw" style="background:#64748B;color:#fff"><span class="name">600</span><span class="hex">64748B</span></div>
    <div class="sw" style="background:#475569;color:#fff"><span class="name">700</span><span class="hex">475569</span></div>
    <div class="sw" style="background:#334155;color:#fff"><span class="name">800</span><span class="hex">334155</span></div>
    <div class="sw" style="background:#1E293B;color:#fff"><span class="name">900 ★</span><span class="hex">1E293B</span></div>
    <div class="sw" style="background:#0B1220;color:#fff"><span class="name">950</span><span class="hex">0B1220</span></div>
  </div>
</body></html>
