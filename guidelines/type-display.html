<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-page); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .item { display: grid; grid-template-columns: 80px 1fr; align-items: baseline; gap: 16px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); padding-top: 6px; }
  h1.s { font-size: 48px; font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; margin: 0; }
  h2.s { font-size: 36px; font-weight: 600; line-height: 1.3; letter-spacing: -0.02em; margin: 0; }
  h3.s { font-size: 28px; font-weight: 600; line-height: 1.3; margin: 0; }
</style></head>
<body>
  <div class="stack">
    <div class="item"><div class="meta">H1 / 48</div><h1 class="s">Pyramid of Success</h1></div>
    <div class="item"><div class="meta">H2 / 36</div><h2 class="s">Mukammal natijalar</h2></div>
    <div class="item"><div class="meta">H3 / 28</div><h3 class="s">IELTS · CEFR · SAT</h3></div>
  </div>
</body></html>
