<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .sw { border-radius: var(--radius-md); padding: 14px; min-height: 100px; display: flex; flex-direction: column; justify-content: space-between; font-size: 12px; }
  .sw .name { font-weight: 600; }
  .sw .hex { font-family: var(--font-mono); opacity: 0.75; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#FEF3C7;color:#92400E"><span class="name">amber-100</span><span class="hex">#FEF3C7</span></div>
    <div class="sw" style="background:#FBBF24;color:#7C2D12"><span class="name">amber-400</span><span class="hex">#FBBF24</span></div>
    <div class="sw" style="background:#F59E0B;color:#1E293B"><span class="name">amber-500 ★</span><span class="hex">#F59E0B</span></div>
    <div class="sw" style="background:#D97706;color:#fff"><span class="name">amber-600</span><span class="hex">#D97706</span></div>
  </div>
</body></html>
