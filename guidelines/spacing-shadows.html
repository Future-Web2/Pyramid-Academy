<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows" subtitle="Cool slate-tinted lift system" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 24px; background: var(--bg-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .card { width: 100%; height: 80px; background: white; border-radius: var(--radius-md); }
  .name { font-size: 12px; font-weight: 600; }
  .x { box-shadow: var(--shadow-xs); }
  .s { box-shadow: var(--shadow-sm); }
  .m { box-shadow: var(--shadow-md); }
  .l { box-shadow: var(--shadow-lg); }
  .b { box-shadow: var(--shadow-brand); background: var(--brand-navy-600); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="card x"></div><div class="name">xs</div></div>
    <div class="item"><div class="card s"></div><div class="name">sm</div></div>
    <div class="item"><div class="card m"></div><div class="name">md</div></div>
    <div class="item"><div class="card l"></div><div class="name">lg</div></div>
    <div class="item"><div class="card b"></div><div class="name">brand</div></div>
  </div>
</body></html>
