<!-- @dsCard group="Type" viewport="700x180" name="Font family" subtitle="Inter (primary) · Poppins (alt display)" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .col { background: white; border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 20px; }
  .col .name { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
  .col .glyph { font-size: 56px; font-weight: 700; line-height: 1; margin-bottom: 6px; letter-spacing: -0.03em; }
  .col .weights { display: flex; gap: 12px; align-items: baseline; font-size: 14px; color: var(--text-muted); }
  .col.inter .glyph { font-family: var(--font-sans); }
  .col.poppins .glyph { font-family: var(--font-display-alt); }
  .col.inter .weights { font-family: var(--font-sans); }
  .col.poppins .weights { font-family: var(--font-display-alt); }
  .w { padding: 2px 6px; border-radius: 4px; background: var(--slate-100); }
</style></head>
<body>
  <div class="cols">
    <div class="col inter">
      <div class="name">Sans · Display · Body</div>
      <div class="glyph">Aa Бб</div>
      <div class="weights"><span class="w" style="font-weight:400">400</span><span class="w" style="font-weight:500">500</span><span class="w" style="font-weight:600">600</span><span class="w" style="font-weight:700">700</span><span style="margin-left:auto;font-weight:700">Inter</span></div>
    </div>
    <div class="col poppins">
      <div class="name">Display alt</div>
      <div class="glyph">Aa Бб</div>
      <div class="weights"><span class="w" style="font-weight:500">500</span><span class="w" style="font-weight:600">600</span><span class="w" style="font-weight:700">700</span><span style="margin-left:auto;font-weight:700">Poppins</span></div>
    </div>
  </div>
</body></html>
