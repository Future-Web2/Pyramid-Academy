<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — token + visual" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--brand-navy-600); border-radius: var(--radius-xs); width: 28px; }
  .label { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); }
  .num { font-size: 12px; font-weight: 600; color: var(--text-default); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="num">4</span><span class="label">1</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="num">8</span><span class="label">2</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="num">12</span><span class="label">3</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="num">16</span><span class="label">4</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="num">24</span><span class="label">6</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="num">32</span><span class="label">8</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="num">48</span><span class="label">12</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="num">64</span><span class="label">16</span></div>
    <div class="item"><div class="bar" style="height:80px"></div><span class="num">80</span><span class="label">20</span></div>
    <div class="item"><div class="bar" style="height:96px"></div><span class="num">96</span><span class="label">24</span></div>
  </div>
</body></html>
