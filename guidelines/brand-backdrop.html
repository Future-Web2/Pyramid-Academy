<!-- @dsCard group="Brand" viewport="700x180" name="Navy Felt Backdrop" subtitle="The brand environment, recreated as a gradient" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); }
  .felt { border-radius: var(--radius-lg); height: 130px; background: var(--gradient-navy-felt); display: flex; align-items: center; padding: 0 28px; color: white; box-shadow: var(--shadow-md); position: relative; overflow: hidden; }
  .felt::after { content: ""; position: absolute; inset: 0; background: radial-gradient(80% 60% at 50% 50%, transparent 0%, rgba(0,0,0,0.18) 100%); pointer-events: none; }
  .felt svg { width: 64px; height: 64px; margin-right: 20px; flex-shrink: 0; color: var(--brand-silver-50); position: relative; z-index: 1; }
  .meta { position: relative; z-index: 1; }
  .meta h3 { color: white; font-size: 20px; font-weight: 700; margin: 0 0 4px; }
  .meta code { font-family: var(--font-mono); font-size: 12px; opacity: 0.7; color: var(--brand-silver-100); }
</style></head>
<body>
  <div class="felt">
    <svg viewBox="0 0 200 180" fill="currentColor"><path d="M10 160 L70 160 L40 60 Z"/><path d="M130 160 L190 160 L160 60 Z"/><path d="M100 10 L125 90 L100 160 L75 90 Z"/></svg>
    <div class="meta"><h3>Brand environment</h3><code>--gradient-navy-felt</code></div>
  </div>
</body></html>
