<!-- @dsCard group="Colors" viewport="700x150" name="Semantic — Feedback" subtitle="Success, danger, info — used sparingly" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-md); padding: 14px 18px; min-height: 100px; display: flex; flex-direction: column; justify-content: space-between; }
  .sw .name { font-weight: 700; font-size: 14px; }
  .sw .meta { display: flex; gap: 14px; font-size: 11px; font-family: var(--font-mono); opacity: 0.75; }
  .sw .chip { display: inline-block; width: 18px; height: 18px; border-radius: 4px; margin-right: 4px; vertical-align: middle; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#DCFCE7;color:#14532D">
      <span class="name">Success</span>
      <span class="meta"><span><span class="chip" style="background:#16A34A"></span>600</span><span><span class="chip" style="background:#DCFCE7;border:1px solid #BBF7D0"></span>100</span></span>
    </div>
    <div class="sw" style="background:#FEE2E2;color:#7F1D1D">
      <span class="name">Danger</span>
      <span class="meta"><span><span class="chip" style="background:#DC2626"></span>600</span><span><span class="chip" style="background:#FEE2E2;border:1px solid #FECACA"></span>100</span></span>
    </div>
    <div class="sw" style="background:#E0F2FE;color:#075985">
      <span class="name">Info</span>
      <span class="meta"><span><span class="chip" style="background:#0284C7"></span>600</span><span><span class="chip" style="background:#E0F2FE;border:1px solid #BAE6FD"></span>100</span></span>
    </div>
  </div>
</body></html>
