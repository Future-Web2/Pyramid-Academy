<!-- @dsCard group="Spacing" viewport="700x180" name="Corner radii" subtitle="Restrained · 6/8/12/16/pill" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; align-items: end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 80px; height: 80px; background: var(--brand-navy-600); }
  .name { font-size: 12px; font-weight: 600; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="name">xs</div><div class="val">4</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">sm</div><div class="val">6</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">md</div><div class="val">8</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">lg</div><div class="val">12</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="name">xl</div><div class="val">16</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:120px;height:48px"></div><div class="name">pill</div><div class="val">999</div></div>
  </div>
</body></html>
