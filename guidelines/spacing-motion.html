<!-- @dsCard group="Spacing" viewport="700x150" name="Motion & easing" subtitle="200ms standard · cubic-bezier(.4,0,.2,1)" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .item { background: white; border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 12px 14px; }
  .name { font-size: 13px; font-weight: 600; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .track { height: 4px; background: var(--slate-100); border-radius: 999px; position: relative; margin-top: 12px; overflow: hidden; }
  .dot { position: absolute; left: 0; top: 50%; transform: translate(0, -50%); width: 12px; height: 12px; background: var(--brand-navy-600); border-radius: 999px; animation: slide 1800ms infinite; }
  .e1 .dot { animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
  .e2 .dot { animation-timing-function: cubic-bezier(0.2, 0.7, 0.1, 1); }
  .e3 .dot { animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
  .e4 .dot { animation-timing-function: cubic-bezier(0.4, 0, 1, 1); }
  @keyframes slide { 0%, 100% { left: 0; } 50% { left: calc(100% - 12px); } }
</style></head>
<body>
  <div class="row">
    <div class="item e1"><div class="name">standard</div><div class="val">.4, 0, .2, 1</div><div class="track"><div class="dot"></div></div></div>
    <div class="item e2"><div class="name">emphasis</div><div class="val">.2, .7, .1, 1</div><div class="track"><div class="dot"></div></div></div>
    <div class="item e3"><div class="name">out</div><div class="val">0, 0, .2, 1</div><div class="track"><div class="dot"></div></div></div>
    <div class="item e4"><div class="name">in</div><div class="val">.4, 0, 1, 1</div><div class="track"><div class="dot"></div></div></div>
  </div>
</body></html>
