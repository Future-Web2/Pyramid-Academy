<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Navy ramp" subtitle="Primary brand color" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .sw { border-radius: var(--radius-md); padding: 12px; min-height: 100px; display: flex; flex-direction: column; justify-content: space-between; font-size: 11px; }
  .sw .name { font-weight: 600; }
  .sw .hex { font-family: var(--font-mono); opacity: 0.75; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#EFF4FF;color:#1E40AF"><span class="name">navy-50</span><span class="hex">#EFF4FF</span></div>
    <div class="sw" style="background:#DBE7FE;color:#1E40AF"><span class="name">navy-100</span><span class="hex">#DBE7FE</span></div>
    <div class="sw" style="background:#3B82F6;color:#fff"><span class="name">navy-500</span><span class="hex">#3B82F6</span></div>
    <div class="sw" style="background:#2563EB;color:#fff"><span class="name">navy-600 ★</span><span class="hex">#2563EB</span></div>
    <div class="sw" style="background:#1E40AF;color:#fff"><span class="name">navy-700</span><span class="hex">#1E40AF</span></div>
    <div class="sw" style="background:#14296B;color:#fff"><span class="name">navy-800</span><span class="hex">#14296B</span></div>
    <div class="sw" style="background:#0B1E4A;color:#fff"><span class="name">navy-900</span><span class="hex">#0B1E4A</span></div>
  </div>
</body></html>
